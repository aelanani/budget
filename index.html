<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>داشبورد المصروفات والدخل</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  :root {
    --font-sans: 'Segoe UI', system-ui, sans-serif;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f5;
    --color-background-info: #EBF5FF;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #666;
    --color-text-info: #1a6bbf;
    --color-border-primary: #ccc;
    --color-border-secondary: #ddd;
    --color-border-tertiary: #eee;
    --color-border-info: #90c2f0;
    --border-radius-md: 6px;
    --border-radius-lg: 10px;
  }
  body { margin: 0; padding: 10px; background: var(--color-background-primary); }
  input, select, button { border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); padding: 6px 10px; outline: none; }
  input:focus { border-color: var(--color-border-info); }
</style>
<h2 class="sr-only">داشبورد مصروفات ودخل</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{font-family:var(--font-sans);direction:rtl;display:flex;height:calc(100vh - 40px);overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:200px;min-width:200px;border-left:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:12px 10px 8px;border-bottom:0.5px solid var(--color-border-tertiary)}
.sidebar-title{font-size:11px;font-weight:600;color:var(--color-text-secondary);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.btn-add-year{width:100%;padding:5px 8px;border-radius:var(--border-radius-md);border:0.5px dashed var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);font-size:11px;cursor:pointer;font-family:var(--font-sans);text-align:center}
.btn-add-year:hover{border-color:var(--color-border-info);color:var(--color-text-info)}
.years-list{flex:1;overflow-y:auto;padding:6px 0}
.year-group{}
.year-row{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;cursor:pointer;font-size:12px;font-weight:600;color:var(--color-text-primary);user-select:none}
.year-row:hover{background:var(--color-background-secondary)}
.year-row.active-year{color:var(--color-text-info)}
.year-chevron{font-size:10px;transition:transform .2s;color:var(--color-text-secondary)}
.year-chevron.open{transform:rotate(90deg)}
.year-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.year-row:hover .year-actions{opacity:1}
.btn-year-action{background:none;border:none;cursor:pointer;font-size:11px;color:var(--color-text-secondary);padding:1px 3px;border-radius:3px}
.btn-year-action:hover{color:#D85A30}
.months-list{overflow:hidden;max-height:0;transition:max-height .25s ease}
.months-list.open{max-height:500px}
.month-item{display:flex;align-items:center;justify-content:space-between;padding:4px 10px 4px 22px;cursor:pointer;font-size:12px;color:var(--color-text-secondary);border-radius:4px;margin:1px 4px}
.month-item:hover{background:var(--color-background-secondary)}
.month-item.active{background:var(--color-background-info);color:var(--color-text-info);font-weight:500}
.month-item-actions{display:flex;gap:3px;opacity:0}
.month-item:hover .month-item-actions{opacity:1}
.btn-m-action{background:none;border:none;cursor:pointer;font-size:11px;color:var(--color-text-secondary);padding:1px 3px}
.btn-m-action:hover{color:#D85A30}
.btn-add-month{display:flex;align-items:center;gap:5px;margin:2px 10px;padding:4px 8px;border-radius:var(--border-radius-md);border:0.5px dashed var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);font-size:11px;cursor:pointer;font-family:var(--font-sans);width:calc(100% - 20px)}
.btn-add-month:hover{color:var(--color-text-info);border-color:var(--color-border-info)}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:1rem}
.page{display:none}.page.active{display:block}

/* nav tabs between Detail / Analytics */
.page-tabs{display:flex;gap:0;margin-bottom:1rem;border-radius:var(--border-radius-md);overflow:hidden;border:0.5px solid var(--color-border-secondary);width:fit-content}
.ptab{padding:6px 20px;border:none;background:transparent;font-size:12px;cursor:pointer;font-family:var(--font-sans);color:var(--color-text-secondary)}
.ptab.active{background:var(--color-background-info);color:var(--color-text-info);font-weight:500}
.ptab:not(:last-child){border-left:0.5px solid var(--color-border-secondary)}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1rem}
.kpi{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.kpi-lbl{font-size:10px;color:var(--color-text-secondary);margin-bottom:4px}
.kpi-val{font-size:16px;font-weight:600}
.up{color:#1D9E75}.down{color:#D85A30}.neu{color:var(--color-text-primary)}

/* Layout */
.layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem}
.panel-title{font-size:12px;font-weight:600;color:var(--color-text-secondary);margin-bottom:10px}

/* Section toggle */
.stabs{display:flex;gap:0;margin-bottom:1rem;border-radius:var(--border-radius-md);overflow:hidden;border:0.5px solid var(--color-border-secondary);width:fit-content}
.stab{padding:5px 16px;border:none;background:transparent;font-size:12px;cursor:pointer;font-family:var(--font-sans);color:var(--color-text-secondary)}
.stab.active{background:var(--color-background-info);color:var(--color-text-info);font-weight:500}
.stab:not(:last-child){border-left:0.5px solid var(--color-border-secondary)}

/* Cat tabs */
.ctabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.ctab{padding:3px 9px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);font-size:11px;cursor:pointer;font-family:var(--font-sans)}
.ctab.active{font-weight:500}

/* Add row */
.add-row{display:flex;gap:7px;margin-bottom:10px}
.add-row input{font-size:12px;font-family:var(--font-sans)}
.add-row input:first-child{flex:1}
.add-row input:nth-child(2){width:85px}
.btn-add{padding:0 11px;border-radius:var(--border-radius-md);border:none;background:var(--color-background-info);color:var(--color-text-info);font-size:12px;cursor:pointer;font-family:var(--font-sans);white-space:nowrap}
.btn-add-inc{padding:0 11px;border-radius:var(--border-radius-md);border:none;background:#E1F5EE;color:#085041;font-size:12px;cursor:pointer;font-family:var(--font-sans);white-space:nowrap}

/* Items */
.items-list{max-height:230px;overflow-y:auto}
.item-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
.item-row:last-child{border-bottom:none}
.item-name{flex:1;color:var(--color-text-primary)}
.badge{font-size:10px;padding:2px 6px;border-radius:50px}
.item-amt{font-weight:500;color:var(--color-text-primary);min-width:70px;text-align:left}
.item-amt-inc{font-weight:500;color:#1D9E75;min-width:70px;text-align:left}
.btn-del{background:none;border:none;color:var(--color-text-secondary);cursor:pointer;font-size:14px;padding:1px 4px}
.btn-del:hover{color:#D85A30}
.empty{text-align:center;padding:1.5rem 0;color:var(--color-text-secondary);font-size:12px}

/* Summary bars */
.sum-row{padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
.sum-row:last-child{border-bottom:none}
.sum-bar-track{height:4px;background:var(--color-background-secondary);border-radius:3px;margin-top:3px;overflow:hidden}
.sum-bar-fill{height:100%;border-radius:3px}

/* Analytics page */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:1rem}
.a-panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem}
.a-panel.full{grid-column:1/-1}
.a-title{font-size:12px;font-weight:600;color:var(--color-text-secondary);margin-bottom:12px}
.month-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px}
.month-bar-label{width:50px;color:var(--color-text-secondary);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.month-bar-track{flex:1;height:14px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden;position:relative}
.month-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.month-bar-val{width:80px;text-align:left;font-weight:500;white-space:nowrap}
.highlight-card{border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:8px}
.hl-title{font-size:10px;color:var(--color-text-secondary);margin-bottom:4px}
.hl-name{font-size:14px;font-weight:600}
.hl-val{font-size:12px;margin-top:2px}

/* Year selector for analytics */
.year-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.yfbtn{padding:4px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);font-size:11px;cursor:pointer;font-family:var(--font-sans)}
.yfbtn.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info);font-weight:500}

/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;min-width:280px}
.modal-title{font-size:14px;font-weight:600;margin-bottom:12px}
.modal-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.modal-row input,.modal-row select{flex:1;font-size:13px;font-family:var(--font-sans)}
.modal-label{font-size:12px;color:var(--color-text-secondary);white-space:nowrap}
.modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.btn-confirm{padding:6px 14px;border-radius:var(--border-radius-md);border:none;background:var(--color-background-info);color:var(--color-text-info);font-size:12px;cursor:pointer;font-family:var(--font-sans)}
.btn-cancel{padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;font-size:12px;cursor:pointer;font-family:var(--font-sans);color:var(--color-text-secondary)}

@media(max-width:640px){.layout,.analytics-grid{grid-template-columns:1fr}.a-panel.full{grid-column:auto}.sidebar{width:160px;min-width:160px}}
@media(max-width:480px){.app{flex-direction:column}.sidebar{width:100%;min-width:0;height:auto;max-height:200px;border-left:none;border-bottom:0.5px solid var(--color-border-tertiary)}.main{height:auto}}
</style>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">السنوات</div>
      <button class="btn-add-year" onclick="openYearModal()">+ سنة جديدة</button>
    </div>
    <div class="years-list" id="yearsList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- Page tabs -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <div style="font-size:13px;font-weight:600;color:var(--color-text-primary)" id="pageHeading">—</div>
      <div class="page-tabs">
        <button class="ptab active" id="ptabDetail" onclick="switchPage('detail')">📋 التفاصيل</button>
        <button class="ptab" id="ptabAnalytics" onclick="switchPage('analytics')">📊 التقارير</button>
      </div>
    </div>

    <!-- DETAIL PAGE -->
    <div class="page active" id="pageDetail">
      <div class="kpis" id="kpiCards"></div>
      <div class="layout">
        <!-- Input panel -->
        <div class="panel">
          <div class="stabs">
            <button class="stab active" id="stabExp" onclick="switchSection('expenses')">📤 مصروفات</button>
            <button class="stab" id="stabInc" onclick="switchSection('income')">📥 دخل</button>
          </div>
          <!-- Expenses -->
          <div id="secExp">
            <div class="ctabs" id="catTabs"></div>
            <div class="add-row">
              <input type="text" id="itemName" placeholder="اسم المصروف">
              <input type="number" id="itemAmt" placeholder="المبلغ">
              <button class="btn-add" onclick="addItem()">+ إضافة</button>
            </div>
            <div class="items-list" id="itemsList"></div>
          </div>
          <!-- Income -->
          <div id="secInc" style="display:none">
            <div class="ctabs" id="incCatTabs"></div>
            <div class="add-row">
              <input type="text" id="incName" placeholder="مصدر الدخل">
              <input type="number" id="incAmt" placeholder="المبلغ">
              <button class="btn-add-inc" onclick="addIncSource()">+ إضافة</button>
            </div>
            <div class="items-list" id="incList"></div>
          </div>
        </div>
        <!-- Summary panel -->
        <div class="panel">
          <div class="panel-title">📋 ملخص الشهر</div>
          <div id="summaryRows"></div>
        </div>
      </div>
    </div>

    <!-- ANALYTICS PAGE -->
    <div class="page" id="pageAnalytics">
      <div class="year-filter" id="yearFilter"></div>
      <!-- Year KPIs -->
      <div class="kpis" id="yearKpis"></div>
      <div class="analytics-grid">
        <!-- Best/Worst month -->
        <div class="a-panel">
          <div class="a-title">🏆 أفضل وأسوأ شهر (صافي)</div>
          <div id="bestWorst"></div>
        </div>
        <!-- Monthly net chart -->
        <div class="a-panel">
          <div class="a-title">📈 صافي كل شهر</div>
          <div id="monthlyNetChart"></div>
        </div>
        <!-- Monthly income vs expenses -->
        <div class="a-panel full">
          <div class="a-title">📊 الدخل مقابل المصروفات</div>
          <div id="incVsExpChart"></div>
        </div>
        <!-- Category breakdown for year -->
        <div class="a-panel">
          <div class="a-title">🗂 توزيع المصروفات</div>
          <div id="catBreakdown"></div>
        </div>
        <!-- Monthly savings % -->
        <div class="a-panel">
          <div class="a-title">💰 نسبة التوفير شهرياً</div>
          <div id="savingsChart"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modalYear">
  <div class="modal-box">
    <div class="modal-title">إضافة سنة جديدة</div>
    <div class="modal-row"><label class="modal-label">السنة:</label><input type="number" id="newYearNum" placeholder="2027" min="2000" max="2100"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()">إلغاء</button>
      <button class="btn-confirm" onclick="confirmAddYear()">إضافة</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalMonth">
  <div class="modal-box">
    <div class="modal-title" id="modalMonthTitle">إضافة شهر</div>
    <div class="modal-row"><label class="modal-label">الاسم:</label><input type="text" id="newMonthName" placeholder="مثال: أغسطس"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()">إلغاء</button>
      <button class="btn-confirm" onclick="confirmAddMonth()">إضافة</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalRenameMonth">
  <div class="modal-box">
    <div class="modal-title">تعديل اسم الشهر</div>
    <div class="modal-row"><label class="modal-label">الاسم:</label><input type="text" id="renameMonthInput"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()">إلغاء</button>
      <button class="btn-confirm" onclick="confirmRenameMonth()">حفظ</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalRenameYear">
  <div class="modal-box">
    <div class="modal-title">تعديل اسم السنة</div>
    <div class="modal-row"><label class="modal-label">الاسم:</label><input type="text" id="renameYearInput"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()">إلغاء</button>
      <button class="btn-confirm" onclick="confirmRenameYear()">حفظ</button>
    </div>
  </div>
</div>

let state = JSON.parse(JSON.stringify(SEED));
let pendingYearIdx = null; // for rename
let pendingMonthYearIdx = null; // for add/rename month
let pendingMonthIdx = null;

const fmt = n => Number(n).toLocaleString('ar-EG',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = n => n.toFixed(1)+'%';

function load(){
  try{
    const r = localStorage.getItem(STORE_KEY);
    if(r){ state=JSON.parse(r); migrate(); }
  }catch(e){}
  render();
}
function migrate(){
  state.years.forEach(y=>{
    y.months.forEach(m=>{
      if(!m.incomeSources) m.incomeSources=[];
    });
  });
  if(state.analyticsYear===undefined) state.analyticsYear=0;
}
function save(){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(state)); }catch(e){} }

function curYear(){ return state.years[state.currentYear]; }
function curMonth(){ return curYear()?.months[state.currentMonth]; }

function totalIncome(m){
  const s=m.incomeSources||[];
  if(s.length>0) return s.reduce((a,v)=>a+v.amt,0);
  return m.income||0;
}
function monthExpenses(m){
  const byCat={};
  CATS.forEach(c=>byCat[c.key]=0);
  (m.items||[]).forEach(it=>{ byCat[it.cat]=(byCat[it.cat]||0)+it.amt; });
  return { byCat, total:Object.values(byCat).reduce((a,v)=>a+v,0) };
}
function incByCat(m){
  const b={};
  INC_CATS.forEach(c=>b[c.key]=0);
  (m.incomeSources||[]).forEach(s=>{ b[s.cat]=(b[s.cat]||0)+s.amt; });
  return b;
}

// ═══════════ RENDER ═══════════
function render(){
  renderSidebar();
  renderHeading();
  renderKPIs();
  renderCatTabs();
  renderIncCatTabs();
  renderItems();
  renderIncList();
  renderSummary();
  renderAnalytics();
}

function renderSidebar(){
  const el=document.getElementById('yearsList');
  el.innerHTML=state.years.map((y,yi)=>{
    const open=yi===state.currentYear;
    return `
    <div class="year-group">
      <div class="year-row ${open?'active-year':''}" onclick="toggleYear(${yi})">
        <span>&#x25B6; ${y.name}</span>
        <div style="display:flex;align-items:center;gap:4px">
          <div class="year-actions">
            <button class="btn-year-action" title="تعديل" onclick="event.stopPropagation();openRenameYear(${yi})">✏️</button>
            <button class="btn-year-action" title="حذف" onclick="event.stopPropagation();deleteYear(${yi})">🗑</button>
          </div>
          <span class="year-chevron ${open?'open':''}">▶</span>
        </div>
      </div>
      <div class="months-list ${open?'open':''}">
        ${y.months.map((m,mi)=>`
          <div class="month-item ${yi===state.currentYear&&mi===state.currentMonth?'active':''}"
               onclick="selectMonth(${yi},${mi})">
            <span>${m.name}</span>
            <div class="month-item-actions">
              <button class="btn-m-action" title="تعديل" onclick="event.stopPropagation();openRenameMonth(${yi},${mi})">✏️</button>
              <button class="btn-m-action" title="حذف" onclick="event.stopPropagation();deleteMonth(${yi},${mi})">✕</button>
            </div>
          </div>
        `).join('')}
        <button class="btn-add-month" onclick="openAddMonth(${yi})">+ شهر جديد</button>
      </div>
    </div>`;
  }).join('');
}

function renderHeading(){
  const y=curYear(); const m=curMonth();
  document.getElementById('pageHeading').textContent = m ? `${y?.name} — ${m.name}` : (y?.name||'—');
}

function renderKPIs(){
  const m=curMonth(); if(!m){ document.getElementById('kpiCards').innerHTML=''; return; }
  const {total}=monthExpenses(m);
  const inc=totalIncome(m);
  const rem=inc-total;
  const pct=inc>0?Math.round(rem/inc*100):0;
  document.getElementById('kpiCards').innerHTML=`
    <div class="kpi"><div class="kpi-lbl">📥 الدخل</div><div class="kpi-val up">${fmt(inc)} ج</div></div>
    <div class="kpi"><div class="kpi-lbl">📤 المصروفات</div><div class="kpi-val down">${fmt(total)} ج</div></div>
    <div class="kpi"><div class="kpi-lbl">💰 المتبقي</div><div class="kpi-val ${rem>=0?'up':'down'}">${rem>=0?'':'-'}${fmt(Math.abs(rem))} ج</div></div>
    <div class="kpi"><div class="kpi-lbl">📊 نسبة التوفير</div><div class="kpi-val ${pct>=0?'up':'down'}">${pct}%</div></div>
    <div class="kpi"><div class="kpi-lbl">🗂 بنود</div><div class="kpi-val neu">${(m.items||[]).length}</div></div>
  `;
}

function renderCatTabs(){
  document.getElementById('catTabs').innerHTML=CATS.map(c=>
    `<button class="ctab ${c.key===state.currentCat?'active':''}"
      style="${c.key===state.currentCat?`background:${c.bg};color:${c.tc};border-color:${c.color}`:''}"
      onclick="switchCat('${c.key}')">${c.name}</button>`
  ).join('');
}
function renderIncCatTabs(){
  document.getElementById('incCatTabs').innerHTML=INC_CATS.map(c=>
    `<button class="ctab ${c.key===state.currentIncCat?'active':''}"
      style="${c.key===state.currentIncCat?`background:${c.bg};color:${c.tc};border-color:${c.color}`:''}"
      onclick="switchIncCat('${c.key}')">${c.name}</button>`
  ).join('');
}

function renderItems(){
  const m=curMonth();
  const items=(m?.items||[]).filter(it=>it.cat===state.currentCat);
  const el=document.getElementById('itemsList');
  if(!items.length){ el.innerHTML='<div class="empty">مفيش بنود في الفئة دي لسه</div>'; return; }
  const cat=CATS.find(c=>c.key===state.currentCat);
  el.innerHTML=items.map(item=>{
    const ri=(m.items||[]).indexOf(item);
    return `<div class="item-row">
      <span class="item-name">${item.name}</span>
      <span class="badge" style="background:${cat.bg};color:${cat.tc}">${cat.name}</span>
      <span class="item-amt">${fmt(item.amt)} ج</span>
      <button class="btn-del" onclick="deleteItem(${ri})">×</button>
    </div>`;
  }).join('');
}

function renderIncList(){
  const m=curMonth();
  const sources=(m?.incomeSources||[]).filter(s=>s.cat===state.currentIncCat);
  const el=document.getElementById('incList');
  if(!sources.length){ el.innerHTML='<div class="empty">مفيش مصادر دخل في الفئة دي لسه</div>'; return; }
  const cat=INC_CATS.find(c=>c.key===state.currentIncCat);
  el.innerHTML=sources.map(s=>{
    const ri=(m.incomeSources||[]).indexOf(s);
    return `<div class="item-row">
      <span class="item-name">${s.name}</span>
      <span class="badge" style="background:${cat.bg};color:${cat.tc}">${cat.name}</span>
      <span class="item-amt-inc">+${fmt(s.amt)} ج</span>
      <button class="btn-del" onclick="deleteIncSource(${ri})">×</button>
    </div>`;
  }).join('');
}

function renderSummary(){
  const m=curMonth();
  if(!m){ document.getElementById('summaryRows').innerHTML=''; return; }
  const {byCat,total}=monthExpenses(m);
  const ibc=incByCat(m);
  const inc=totalIncome(m);
  const maxC=Math.max(...Object.values(byCat),1);

  const srcs=m.incomeSources||[];
  let incHtml='';
  if(srcs.length>0){
    const maxI=Math.max(...INC_CATS.map(c=>ibc[c.key]),1);
    incHtml=`<div style="font-size:11px;font-weight:600;color:var(--color-text-secondary);margin-bottom:6px">📥 مصادر الدخل</div>`+
    INC_CATS.filter(c=>ibc[c.key]>0).map(c=>`
      <div class="sum-row">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span>${c.name}</span><span style="font-weight:500;color:${c.color}">+${fmt(ibc[c.key])} ج</span>
        </div>
        <div class="sum-bar-track"><div class="sum-bar-fill" style="width:${Math.round(ibc[c.key]/maxI*100)}%;background:${c.color}"></div></div>
      </div>`).join('')+
    `<div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;padding:6px 0;margin-bottom:8px;border-bottom:0.5px solid var(--color-border-secondary)">
      <span>إجمالي الدخل</span><span style="color:#1D9E75">+${fmt(inc)} ج</span></div>`;
  }

  document.getElementById('summaryRows').innerHTML=incHtml+
    `<div style="font-size:11px;font-weight:600;color:var(--color-text-secondary);margin-bottom:6px">📤 المصروفات</div>`+
    CATS.map(c=>`<div class="sum-row">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span>${c.name}</span><span style="font-weight:500;color:${c.color}">${fmt(byCat[c.key])} ج</span>
      </div>
      <div class="sum-bar-track"><div class="sum-bar-fill" style="width:${Math.round(byCat[c.key]/maxC*100)}%;background:${c.color}"></div></div>
    </div>`).join('')+
    `<div style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--color-border-secondary);display:flex;justify-content:space-between;font-weight:600;font-size:13px">
      <span>إجمالي المصروفات</span><span>${fmt(total)} ج</span></div>`+
    (inc>0?`<div style="margin-top:6px;display:flex;justify-content:space-between;font-weight:600;font-size:13px">
      <span>المتبقي</span><span style="color:${inc-total>=0?'#1D9E75':'#D85A30'}">${inc-total>=0?'+':''}${fmt(inc-total)} ج</span></div>`:'');
}

// ═══════════ ANALYTICS ═══════════
function renderAnalytics(){
  // year filter buttons
  const yf=document.getElementById('yearFilter');
  yf.innerHTML=[{name:'الكل',idx:-1},...state.years.map((y,i)=>({name:y.name,idx:i}))].map(y=>
    `<button class="yfbtn ${state.analyticsYear===y.idx?'active':''}" onclick="switchAnalyticsYear(${y.idx})">${y.name}</button>`
  ).join('');

  // collect months for selected scope
  let months=[];
  if(state.analyticsYear===-1){
    state.years.forEach((y,yi)=>y.months.forEach((m,mi)=>months.push({m,label:y.name+' '+m.name,yi,mi})));
  } else {
    const y=state.years[state.analyticsYear];
    if(y) y.months.forEach((m,mi)=>months.push({m,label:m.name,yi:state.analyticsYear,mi}));
  }

  if(!months.length){
    ['yearKpis','bestWorst','monthlyNetChart','incVsExpChart','catBreakdown','savingsChart'].forEach(id=>document.getElementById(id).innerHTML='<div class="empty">مفيش بيانات</div>');
    return;
  }

  const nets=months.map(({m})=>totalIncome(m)-monthExpenses(m).total);
  const incomes=months.map(({m})=>totalIncome(m));
  const expenses=months.map(({m})=>monthExpenses(m).total);
  const totalInc=incomes.reduce((a,v)=>a+v,0);
  const totalExp=expenses.reduce((a,v)=>a+v,0);
  const totalNet=nets.reduce((a,v)=>a+v,0);
  const avgSave=totalInc>0?Math.round(totalNet/totalInc*100):0;

  // Year KPIs
  document.getElementById('yearKpis').innerHTML=`
    <div class="kpi"><div class="kpi-lbl">📥 إجمالي الدخل</div><div class="kpi-val up">${fmt(totalInc)} ج</div></div>
    <div class="kpi"><div class="kpi-lbl">📤 إجمالي المصروفات</div><div class="kpi-val down">${fmt(totalExp)} ج</div></div>
    <div class="kpi"><div class="kpi-lbl">💰 إجمالي المتبقي</div><div class="kpi-val ${totalNet>=0?'up':'down'}">${totalNet>=0?'+':''}${fmt(totalNet)} ج</div></div>
    <div class="kpi"><div class="kpi-lbl">📊 متوسط التوفير</div><div class="kpi-val ${avgSave>=0?'up':'down'}">${avgSave}%</div></div>
    <div class="kpi"><div class="kpi-lbl">📅 عدد الشهور</div><div class="kpi-val neu">${months.length}</div></div>
  `;

  // Best/Worst
  const bestIdx=nets.indexOf(Math.max(...nets));
  const worstIdx=nets.indexOf(Math.min(...nets));
  document.getElementById('bestWorst').innerHTML=`
    <div class="highlight-card" style="background:#E1F5EE;margin-bottom:8px">
      <div class="hl-title">🏆 أفضل شهر</div>
      <div class="hl-name" style="color:#085041">${months[bestIdx].label}</div>
      <div class="hl-val" style="color:#1D9E75">صافي +${fmt(nets[bestIdx])} ج</div>
    </div>
    <div class="highlight-card" style="background:#FAECE7">
      <div class="hl-title">⚠️ أسوأ شهر</div>
      <div class="hl-name" style="color:#4A1B0C">${months[worstIdx].label}</div>
      <div class="hl-val" style="color:#D85A30">صافي ${fmt(nets[worstIdx])} ج</div>
    </div>
  `;

  // Monthly net chart
  const maxNet=Math.max(...nets.map(Math.abs),1);
  document.getElementById('monthlyNetChart').innerHTML=months.map(({label},i)=>`
    <div class="month-bar-row">
      <div class="month-bar-label">${label}</div>
      <div class="month-bar-track">
        <div class="month-bar-fill" style="width:${Math.round(Math.abs(nets[i])/maxNet*100)}%;background:${nets[i]>=0?'#1D9E75':'#D85A30'}"></div>
      </div>
      <div class="month-bar-val" style="color:${nets[i]>=0?'#1D9E75':'#D85A30'}">${nets[i]>=0?'+':''}${fmt(nets[i])}</div>
    </div>`).join('');

  // Income vs Expenses chart
  const maxIE=Math.max(...incomes,...expenses,1);
  document.getElementById('incVsExpChart').innerHTML=months.map(({label},i)=>`
    <div style="margin-bottom:10px">
      <div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:3px">${label}</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:10px">
        <span style="width:30px;color:#1D9E75;text-align:right">دخل</span>
        <div class="month-bar-track" style="flex:1"><div class="month-bar-fill" style="width:${Math.round(incomes[i]/maxIE*100)}%;background:#1D9E75"></div></div>
        <span style="width:80px;color:#1D9E75">${fmt(incomes[i])}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;font-size:10px;margin-top:2px">
        <span style="width:30px;color:#D85A30;text-align:right">مصروف</span>
        <div class="month-bar-track" style="flex:1"><div class="month-bar-fill" style="width:${Math.round(expenses[i]/maxIE*100)}%;background:#D85A30"></div></div>
        <span style="width:80px;color:#D85A30">${fmt(expenses[i])}</span>
      </div>
    </div>`).join('');

  // Category breakdown for scope
  const totalByCat={};
  CATS.forEach(c=>totalByCat[c.key]=0);
  months.forEach(({m})=>{
    const {byCat}=monthExpenses(m);
    CATS.forEach(c=>totalByCat[c.key]+=byCat[c.key]);
  });
  const maxCB=Math.max(...Object.values(totalByCat),1);
  document.getElementById('catBreakdown').innerHTML=CATS.map(c=>`
    <div class="month-bar-row">
      <div class="month-bar-label">${c.name}</div>
      <div class="month-bar-track"><div class="month-bar-fill" style="width:${Math.round(totalByCat[c.key]/maxCB*100)}%;background:${c.color}"></div></div>
      <div class="month-bar-val" style="color:${c.color}">${fmt(totalByCat[c.key])}</div>
    </div>`).join('');

  // Savings %
  document.getElementById('savingsChart').innerHTML=months.map(({label},i)=>{
    const pct=incomes[i]>0?Math.round(nets[i]/incomes[i]*100):0;
    const w=Math.min(Math.abs(pct),100);
    return `<div class="month-bar-row">
      <div class="month-bar-label">${label}</div>
      <div class="month-bar-track"><div class="month-bar-fill" style="width:${w}%;background:${pct>=0?'#1D9E75':'#D85A30'}"></div></div>
      <div class="month-bar-val" style="color:${pct>=0?'#1D9E75':'#D85A30'}">${pct}%</div>
    </div>`;
  }).join('');
}

// ═══════════ ACTIONS ═══════════
function toggleYear(yi){
  if(state.currentYear===yi){ /* keep open but let them collapse */ }
  state.currentYear=yi;
  if(state.years[yi].months.length>0) state.currentMonth=0;
  save(); render();
}
function selectMonth(yi,mi){
  state.currentYear=yi; state.currentMonth=mi;
  save(); render();
}
function switchCat(k){ state.currentCat=k; renderCatTabs(); renderItems(); }
function switchIncCat(k){ state.currentIncCat=k; renderIncCatTabs(); renderIncList(); }
function switchSection(s){
  state.currentSection=s;
  document.getElementById('secExp').style.display=s==='expenses'?'':'none';
  document.getElementById('secInc').style.display=s==='income'?'':'none';
  document.getElementById('stabExp').classList.toggle('active',s==='expenses');
  document.getElementById('stabInc').classList.toggle('active',s==='income');
}
function switchPage(p){
  state.currentPage=p;
  document.getElementById('pageDetail').classList.toggle('active',p==='detail');
  document.getElementById('pageAnalytics').classList.toggle('active',p==='analytics');
  document.getElementById('ptabDetail').classList.toggle('active',p==='detail');
  document.getElementById('ptabAnalytics').classList.toggle('active',p==='analytics');
  if(p==='analytics') renderAnalytics();
}
function switchAnalyticsYear(idx){ state.analyticsYear=idx; renderAnalytics(); }

function addItem(){
  const name=document.getElementById('itemName').value.trim();
  const amt=parseFloat(document.getElementById('itemAmt').value);
  if(!name||!amt||amt<=0) return;
  const m=curMonth(); if(!m) return;
  if(!m.items) m.items=[];
  m.items.push({cat:state.currentCat,name,amt});
  document.getElementById('itemName').value='';
  document.getElementById('itemAmt').value='';
  save(); renderKPIs(); renderItems(); renderSummary();
}
function addIncSource(){
  const name=document.getElementById('incName').value.trim();
  const amt=parseFloat(document.getElementById('incAmt').value);
  if(!name||!amt||amt<=0) return;
  const m=curMonth(); if(!m) return;
  if(!m.incomeSources) m.incomeSources=[];
  m.incomeSources.push({cat:state.currentIncCat,name,amt});
  document.getElementById('incName').value='';
  document.getElementById('incAmt').value='';
  save(); renderKPIs(); renderIncList(); renderSummary();
}
function deleteItem(ri){
  const m=curMonth(); m.items.splice(ri,1);
  save(); renderKPIs(); renderItems(); renderSummary();
}
function deleteIncSource(ri){
  const m=curMonth(); m.incomeSources.splice(ri,1);
  save(); renderKPIs(); renderIncList(); renderSummary();
}

// ── Year/Month modals ──
function openYearModal(){ document.getElementById('modalYear').classList.add('open'); document.getElementById('newYearNum').focus(); }
function confirmAddYear(){
  const n=document.getElementById('newYearNum').value.trim();
  if(!n) return;
  state.years.push({name:n,months:[]});
  state.currentYear=state.years.length-1; state.currentMonth=0;
  closeModals(); save(); render();
}
function deleteYear(yi){
  if(state.years.length<=1){alert('لازم يكون فيه سنة واحدة على الأقل');return;}
  if(!confirm('هتحذف السنة دي وكل شهورها؟')) return;
  state.years.splice(yi,1);
  state.currentYear=Math.min(state.currentYear,state.years.length-1);
  state.currentMonth=0;
  save(); render();
}
function openRenameYear(yi){
  pendingYearIdx=yi;
  document.getElementById('renameYearInput').value=state.years[yi].name;
  document.getElementById('modalRenameYear').classList.add('open');
  document.getElementById('renameYearInput').focus();
}
function confirmRenameYear(){
  const n=document.getElementById('renameYearInput').value.trim();
  if(!n||pendingYearIdx===null) return;
  state.years[pendingYearIdx].name=n;
  closeModals(); save(); render();
}

function openAddMonth(yi){
  pendingMonthYearIdx=yi;
  document.getElementById('modalMonthTitle').textContent='إضافة شهر في '+state.years[yi].name;
  document.getElementById('newMonthName').value='';
  document.getElementById('modalMonth').classList.add('open');
  document.getElementById('newMonthName').focus();
}
function confirmAddMonth(){
  const n=document.getElementById('newMonthName').value.trim();
  if(!n||pendingMonthYearIdx===null) return;
  state.years[pendingMonthYearIdx].months.push({name:n,incomeSources:[],income:0,items:[]});
  state.currentYear=pendingMonthYearIdx;
  state.currentMonth=state.years[pendingMonthYearIdx].months.length-1;
  closeModals(); save(); render();
}
function deleteMonth(yi,mi){
  if(!confirm('هتحذف الشهر ده وكل بياناته؟')) return;
  state.years[yi].months.splice(mi,1);
  if(yi===state.currentYear) state.currentMonth=Math.max(0,Math.min(state.currentMonth,state.years[yi].months.length-1));
  save(); render();
}
function openRenameMonth(yi,mi){
  pendingMonthYearIdx=yi; pendingMonthIdx=mi;
  document.getElementById('renameMonthInput').value=state.years[yi].months[mi].name;
  document.getElementById('modalRenameMonth').classList.add('open');
  document.getElementById('renameMonthInput').focus();
}
function confirmRenameMonth(){
  const n=document.getElementById('renameMonthInput').value.trim();
  if(!n||pendingMonthYearIdx===null) return;
  state.years[pendingMonthYearIdx].months[pendingMonthIdx].name=n;
  closeModals(); save(); render();
}

function closeModals(){
  document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open'));
  pendingYearIdx=null; pendingMonthYearIdx=null; pendingMonthIdx=null;
}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) closeModals(); }));

// Keyboard shortcuts
document.getElementById('itemAmt').addEventListener('keydown',e=>{ if(e.key==='Enter') addItem(); });
