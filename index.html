<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ميزانيتي</title>
<style>
:root {
  --font: 'Segoe UI', system-ui, sans-serif;
  --bg: #f8f8f8; --bg2: #ffffff; --bg3: #f2f2f2;
  --txt: #1a1a1a; --txt2: #666; --txt3: #999;
  --brd: #e8e8e8; --brd2: #ddd;
  --blue: #2563EB; --bluebg: #EFF6FF; --bluetc: #1D4ED8;
  --green: #16a34a; --greenbg: #F0FDF4; --greentc: #15803D;
  --red: #DC2626; --redbg: #FEF2F2; --redtc: #B91C1C;
  --yellow: #D97706; --yellowbg: #FFFBEB; --yellowtc: #B45309;
  --purple: #7C3AED; --purplebg: #F5F3FF; --purpletc: #6D28D9;
  --rad: 8px; --rad2: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--txt); min-height: 100vh; }
.app { display: flex; flex-direction: row; height: 100vh; overflow: hidden; }
.sidebar { width: 210px; min-width: 210px; background: var(--bg2); border-left: 1px solid var(--brd); display: flex; flex-direction: column; overflow: hidden; transition: width .25s, min-width .25s; position: relative; }
.sidebar.collapsed { width: 36px; min-width: 36px; }
.sidebar.collapsed .sidebar-inner { opacity: 0; pointer-events: none; }
.sidebar-inner { flex: 1; display: flex; flex-direction: column; overflow: hidden; transition: opacity .2s; }
.sidebar-toggle { position: absolute; top: 50%; left: -18px; transform: translateY(-50%); width: 18px; height: 48px; background: var(--bg2); border: 1px solid var(--brd); border-right: none; border-radius: 6px 0 0 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--txt3); z-index: 10; box-shadow: -2px 0 5px rgba(0,0,0,.08); }
.sidebar.collapsed .sidebar-toggle { left: 0; border-radius: 0 6px 6px 0; border-right: 1px solid var(--brd); border-left: none; }
.toggle-arrow { transition: transform .25s; display: inline-block; }
.sidebar.collapsed .toggle-arrow { transform: rotate(180deg); }
.sidebar-logo { padding: 14px 12px 10px; border-bottom: 1px solid var(--brd); }
.sidebar-logo h1 { font-size: 14px; font-weight: 700; }
.sidebar-logo p { font-size: 11px; color: var(--txt3); margin-top: 2px; }
.sync-status { font-size: 10px; margin-top: 4px; }
.sync-ok { color: var(--green); } .sync-err { color: var(--red); } .sync-load { color: var(--txt3); }
.years-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
.year-hd { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; cursor: pointer; user-select: none; }
.year-hd:hover { background: var(--bg3); }
.year-hd-left { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--txt2); }
.chev { font-size: 10px; transition: transform .2s; }
.chev.open { transform: rotate(90deg); }
.year-hd-actions { display: flex; gap: 2px; opacity: 0; }
.year-hd:hover .year-hd-actions { opacity: 1; }
.icon-btn { background: none; border: none; cursor: pointer; font-size: 11px; padding: 2px 4px; border-radius: 4px; color: var(--txt3); }
.icon-btn:hover { background: var(--brd); color: var(--txt); }
.months-list { overflow: hidden; max-height: 0; transition: max-height .25s; }
.months-list.open { max-height: 600px; }
.month-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 12px 5px 22px; cursor: pointer; font-size: 12px; color: var(--txt2); border-radius: 6px; margin: 1px 6px; }
.month-item:hover { background: var(--bg3); }
.month-item.active { background: var(--bluebg); color: var(--bluetc); font-weight: 600; }
.month-item-actions { display: flex; gap: 2px; opacity: 0; }
.month-item:hover .month-item-actions { opacity: 1; }
.add-month-btn { display: flex; align-items: center; gap: 5px; margin: 2px 10px; padding: 4px 8px; border: 1px dashed var(--brd2); border-radius: var(--rad); background: none; color: var(--txt3); font-size: 11px; cursor: pointer; font-family: var(--font); width: calc(100% - 20px); }
.add-month-btn:hover { color: var(--blue); border-color: var(--blue); }
.add-year-btn { margin: 8px 10px 4px; padding: 6px 8px; border: 1px dashed var(--brd2); border-radius: var(--rad); background: none; color: var(--txt3); font-size: 11px; cursor: pointer; font-family: var(--font); width: calc(100% - 20px); text-align: center; }
.add-year-btn:hover { color: var(--blue); border-color: var(--blue); }
.main { flex: 1; overflow-y: auto; background: var(--bg); min-width: 0; width: 100%; transition: all .25s ease; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; border-bottom: 1px solid var(--brd); background: var(--bg2); position: sticky; top: 0; z-index: 10; }
.topbar-title { font-size: 14px; font-weight: 700; }
.page-tabs { display: flex; border: 1px solid var(--brd2); border-radius: var(--rad); overflow: hidden; }
.ptab { padding: 5px 16px; border: none; background: none; font-size: 12px; cursor: pointer; font-family: var(--font); color: var(--txt2); }
.ptab:not(:last-child) { border-left: 1px solid var(--brd2); }
.ptab.active { background: var(--bluebg); color: var(--bluetc); font-weight: 600; }
.content { padding: 16px 20px; }
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
.kpi { background: var(--bg2); border: 1px solid var(--brd); border-radius: var(--rad2); padding: 12px 14px; }
.kpi-lbl { font-size: 10px; color: var(--txt3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
.kpi-val { font-size: 18px; font-weight: 700; }
.green { color: var(--green); } .red { color: var(--red); } .blue { color: var(--blue); } .gray { color: var(--txt2); }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.card { background: var(--bg2); border: 1px solid var(--brd); border-radius: var(--rad2); padding: 14px; }
.card-title { font-size: 12px; font-weight: 700; color: var(--txt2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .04em; }
.stabs { display: flex; border: 1px solid var(--brd2); border-radius: var(--rad); overflow: hidden; width: fit-content; margin-bottom: 12px; }
.stab { padding: 5px 14px; border: none; background: none; font-size: 12px; cursor: pointer; font-family: var(--font); color: var(--txt2); }
.stab:not(:last-child) { border-left: 1px solid var(--brd2); }
.stab.active { background: var(--bluebg); color: var(--bluetc); font-weight: 600; }
.chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.chip { padding: 3px 10px; border-radius: 20px; border: 1px solid var(--brd2); background: none; font-size: 11px; cursor: pointer; font-family: var(--font); color: var(--txt2); }
.chip.active { font-weight: 600; }
.add-row { display: flex; gap: 6px; margin-bottom: 10px; }
.add-row input { font-size: 12px; font-family: var(--font); border: 1px solid var(--brd2); border-radius: var(--rad); padding: 6px 10px; outline: none; }
.add-row input:focus { border-color: var(--blue); }
.add-row input:first-child { flex: 1; }
.add-row input:nth-child(2) { width: 90px; }
.add-btn { padding: 0 12px; border-radius: var(--rad); border: none; background: var(--bluebg); color: var(--bluetc); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); white-space: nowrap; }
.add-btn-green { padding: 0 12px; border-radius: var(--rad); border: none; background: var(--greenbg); color: var(--greentc); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); white-space: nowrap; }
.items { max-height: 250px; overflow-y: auto; }
.item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--brd); font-size: 12px; }
.item:last-child { border-bottom: none; }
.item-name { flex: 1; }
.item-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; }
.item-amt { font-weight: 600; min-width: 70px; text-align: left; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--txt3); font-size: 14px; padding: 1px 4px; }
.del-btn:hover { color: var(--red); }
.empty { text-align: center; padding: 20px; color: var(--txt3); font-size: 12px; }
.sum-item { padding: 7px 0; border-bottom: 1px solid var(--brd); font-size: 12px; }
.sum-item:last-child { border-bottom: none; }
.sum-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
.bar-track { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; }
.yfilt { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.yfbtn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--brd2); background: none; font-size: 11px; cursor: pointer; font-family: var(--font); color: var(--txt2); }
.yfbtn.active { background: var(--bluebg); color: var(--bluetc); border-color: var(--blue); font-weight: 600; }
.full { grid-column: 1/-1; }
.hl-card { border-radius: var(--rad); padding: 10px 12px; margin-bottom: 8px; }
.hl-lbl { font-size: 10px; color: var(--txt2); margin-bottom: 3px; }
.hl-name { font-size: 14px; font-weight: 700; }
.hl-val { font-size: 12px; margin-top: 2px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 11px; }
.bar-label { width: 100px; color: var(--txt2); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10px; }
.bar-track2 { flex: 1; height: 14px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bar-fill2 { height: 100%; border-radius: 3px; }
.bar-val { width: 90px; text-align: left; font-weight: 600; font-size: 11px; white-space: nowrap; }
.total-row { display: flex; justify-content: space-between; font-weight: 700; font-size: 13px; padding: 8px 0; border-top: 1px solid var(--brd); margin-top: 6px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--bg2); border-radius: var(--rad2); padding: 20px; min-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
.modal h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.modal label { font-size: 12px; color: var(--txt2); display: block; margin-bottom: 4px; }
.modal input { width: 100%; font-size: 13px; font-family: var(--font); border: 1px solid var(--brd2); border-radius: var(--rad); padding: 7px 10px; outline: none; margin-bottom: 12px; }
.modal input:focus { border-color: var(--blue); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.btn-ok { padding: 6px 16px; border-radius: var(--rad); border: none; background: var(--bluebg); color: var(--bluetc); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); }
.btn-cancel { padding: 6px 12px; border-radius: var(--rad); border: 1px solid var(--brd2); background: none; font-size: 12px; cursor: pointer; font-family: var(--font); color: var(--txt2); }

/* ═══ TABLET ═══ */
@media (max-width: 900px) {
  .bar-label { width: 85px; font-size: 10px; }
  .bar-val { width: 80px; font-size: 10px; }
}

/* ═══ MOBILE ═══ */
@media (max-width: 768px) {
  html, body { overflow-x: hidden !important; max-width: 100vw; }
  .app { display: block !important; width: 100% !important; height: 100vh; overflow-y: auto; overflow-x: hidden !important; }
  .main { display: block !important; width: 100% !important; max-width: 100vw !important; margin: 0 !important; padding: 0 !important; min-width: 0 !important; }
  .sidebar { position: fixed !important; top: 0 !important; right: -280px !important; width: 280px !important; min-width: 280px !important; height: 100vh !important; z-index: 9999 !important; transition: right .3s ease !important; box-shadow: -4px 0 24px rgba(0,0,0,.3) !important; background: var(--bg2) !important; overflow-y: auto !important; }
  .sidebar.mob-open { right: 0 !important; }
  .sidebar.collapsed { width: 280px !important; right: -280px !important; opacity: 1 !important; }
  .sidebar.collapsed.mob-open { right: 0 !important; }
  .sidebar.collapsed .sidebar-inner { opacity: 1 !important; pointer-events: auto !important; }
  .sidebar-toggle { display: none !important; }
  .mob-menu-btn { display: flex !important; }
  .grid2 { display: block !important; }
  .grid2 > * { width: 100% !important; margin-bottom: 12px; }
  .full { grid-column: auto; }
  .kpis { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
  .kpi-val { font-size: 15px; }
  .add-row input, .card { max-width: 100% !important; }
  .add-row input:nth-child(2) { width: 80px !important; }
  .modal { min-width: unset !important; width: 90vw !important; }
  .topbar { padding: 10px 12px 8px !important; gap: 6px; }
  .topbar-title { font-size: 12px; }
  .content { padding: 10px 12px !important; }
  .ptab { padding: 4px 8px !important; font-size: 11px; }
  .bar-label { width: 65px !important; font-size: 9px !important; }
  .bar-val { width: 65px !important; font-size: 9px !important; }
}
</style>
</head>

</div>

let S = JSON.parse(JSON.stringify(SEED));

let isLoaded=false;

const fmt = n => Number(n).toLocaleString('ar-EG',{minimumFractionDigits:2,maximumFractionDigits:2});
const curY = () => S.years[S.curY];
const curM = () => curY()?.months[S.curM];

function setStatus(msg,cls){ const el=document.getElementById('syncStatus'); if(el) { el.textContent=msg; el.className='sync-status '+cls; } }

// تفعيل نظام تسجيل الدخول التلقائي والمراقبة
onAuthStateChanged(auth, (user) => {
  const overlay = document.getElementById('authOverlay');
  const txt = document.getElementById('authStatusText');
  
  if (user) {
    if(overlay) overlay.style.display = 'none';
    initFirebaseSync();
  } else {
    if(overlay) overlay.style.display = 'flex';
    if(txt) txt.textContent = "جاري الاتصال الآمن بالسيرفر...";
    
    signInWithEmailAndPassword(auth, MY_EMAIL, MY_PASS)
      .catch(err => {
        if(txt) {
          txt.innerHTML = `<span style="color:var(--red)">فشل تسجيل الدخول التلقائي!</span><br><small style="font-size:10px;">تأكد من تفعيل الـ Authentication في لوحة Firebase.</small>`;
        }
        setStatus('❌ خطأ في التحقق', 'sync-err');
      });
  }
});

function initFirebaseSync() {
  onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    if(data) {
      const uiState = {curY:S.curY,curM:S.curM,curCat:S.curCat,curInc:S.curInc,curSec:S.curSec,curPage:S.curPage,aYear:S.aYear};
      S = {...data, ...uiState};
      if(!S.years) S.years = JSON.parse(JSON.stringify(SEED.years));
      SEED.years.forEach(seedYear => {
        const exists = S.years.find(y => y.name === seedYear.name);
        if(!exists) {
          const insertIdx = S.years.findIndex(y => y.name > seedYear.name);
          if(insertIdx === -1) S.years.push(JSON.parse(JSON.stringify(seedYear)));
          else S.years.splice(insertIdx, 0, JSON.parse(JSON.stringify(seedYear)));
          setTimeout(() => save(), 800);
        }
      });
      S.years.forEach(y=>y.months.forEach(m=>{if(!m.incomeSources)m.incomeSources=[];}));
      if(S.curY >= S.years.length) S.curY = S.years.length - 1;
      if(!isLoaded) {
        const savedY = localStorage.getItem('budget_curY');
        const savedM = localStorage.getItem('budget_curM');
        if(savedY !== null && savedM !== null) {
          const sy = parseInt(savedY), sm = parseInt(savedM);
          if(sy >= 0 && sy < S.years.length && sm >= 0 && sm < (S.years[sy]?.months?.length||0)) {
            S.curY = sy; S.curM = sm;
          } else {
            S.curY = S.years.length - 1; S.curM = 0;
          }
        } else {
          S.curY = S.years.length - 1; S.curM = 0;
        }
      }
    }
    if(!isLoaded){ isLoaded=true; }
    setStatus('✅ متزامن', 'sync-ok');
    render();
  }, (err) => {
    setStatus('❌ خطأ في الاتصال', 'sync-err');
    render();
  });
}

function save(){
  setStatus('⏳ جاري الحفظ...', 'sync-load');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const toSave = {years: S.years};
    set(dbRef, toSave)
      .then(() => setStatus('✅ محفوظ', 'sync-ok'))
      .catch(() => setStatus('❌ فشل الحفظ', 'sync-err'));
  }, 600);
}

function totalInc(m){ const s=m.incomeSources||[]; return s.length?s.reduce((a,v)=>a+v.amt,0):m.income||0; }
function totalExp(m){ return (m.items||[]).reduce((a,v)=>a+v.amt,0); }
function byCat(m){ const b={}; CATS.forEach(c=>b[c.k]=0); (m.items||[]).forEach(i=>b[i.cat]=(b[i.cat]||0)+i.amt); return b; }
function byIncCat(m){ const b={}; INC_CATS.forEach(c=>b[c.k]=0); (m.incomeSources||[]).forEach(s=>b[s.cat]=(b[s.cat]||0)+s.amt); return b; }

function render(){
  renderSidebar(); renderTitle(); renderKPIs(); renderChips(); renderItems(); renderIncList(); renderSummary();
  if(S.curPage==='analytics') renderAnalytics();
}

  document.getElementById('yearsList').innerHTML = S.years.map((y,yi)=>{

      <div class="year-hd" onclick="toggleYear(${yi})">
        <div class="year-hd-left"><span class="chev ${open?'open':''}">▶</span><span>${y.name}</span></div>

      </div>

        ${y.months.map((m,mi)=>`
          <div class="month-item ${yi===S.curY&&mi===S.curM?'active':''}" onclick="selMonth(${yi},${mi})">
            <span>${m.name}</span>

            </div>
          </div>`).join('')}
        <button class="add-month-btn" onclick="openModal('month',${yi})">+ شهر</button>
      </div>
    </div>`;
  }).join('');
}

function renderTitle(){ const y=curY(),m=curM(); document.getElementById('pageTitle').textContent=m?`${y?.name} — ${m.name}`:(y?.name||'—'); }

function renderKPIs(){
  const m=curM(); if(!m){document.getElementById('kpis').innerHTML='';return;}
  const inc=totalInc(m),exp=totalExp(m),rem=inc-exp,pct=inc>0?Math.round(rem/inc*100):0;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="kpi-lbl">الدخل</div><div class="kpi-val green">${fmt(inc)} ج</div></div>
    <div class="kpi"><div class="kpi-lbl">المصروفات</div><div class="kpi-val red">${fmt(exp)} ج</div></div>
    <div class="kpi"><div class="kpi-lbl">المتبقي</div><div class="kpi-val ${rem>=0?'green':'red'}">${rem>=0?'+':''}${fmt(rem)} ج</div></div>
    <div class="kpi"><div class="kpi-lbl">نسبة التوفير</div><div class="kpi-val ${pct>=0?'green':'red'}">${pct}%</div></div>
    <div class="kpi"><div class="kpi-lbl">عدد البنود</div><div class="kpi-val gray">${(m.items||[]).length}</div></div>`;
}

function renderChips(){

function renderItems(){

function renderIncList(){

function renderSummary(){
  const m=curM(); if(!m){document.getElementById('summary').innerHTML='';return;}
  const bc=byCat(m),maxC=Math.max(...Object.values(bc),1),inc=totalInc(m),exp=totalExp(m);
  const srcs=m.incomeSources||[];
  let incHtml='';
  if(srcs.length){
    const ibc=byIncCat(m),maxI=Math.max(...Object.values(ibc),1);
    incHtml=`<div style="font-size:11px;font-weight:700;color:#666;margin-bottom:6px;text-transform:uppercase">📥 مصادر الدخل</div>`+
    INC_CATS.filter(c=>ibc[c.k]>0).map(c=>`<div class="sum-item"><div class="sum-row"><span>${c.n}</span><span style="color:${c.c};font-weight:600">+${fmt(ibc[c.k])} ج</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(ibc[c.k]/maxI*100)}%;background:${c.c}"></div></div></div>`).join('')+
    `<div class="total-row"><span>إجمالي الدخل</span><span style="color:#16a34a">+${fmt(inc)} ج</span></div>`;
  }
  document.getElementById('summary').innerHTML=incHtml+
    `<div style="font-size:11px;font-weight:700;color:#666;margin-bottom:6px;margin-top:${srcs.length?'12px':'0'};text-transform:uppercase">📤 المصروفات</div>`+
    CATS.map(c=>`<div class="sum-item"><div class="sum-row"><span>${c.n}</span><span style="color:${c.c};font-weight:600">${fmt(bc[c.k])} ج</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(bc[c.k]/maxC*100)}%;background:${c.c}"></div></div></div>`).join('')+
    `<div class="total-row"><span>إجمالي المصروفات</span><span>${fmt(exp)} ج</span></div>`+
    (inc>0?`<div class="total-row" style="border-top:none;margin-top:0;font-size:11px;color:var(--txt2)"><span>صافي الوفر</span><span class="${inc-exp>=0?'green':'red'}">${inc-exp>=0?'+':''}${fmt(inc-exp)} ج</span></div>`:'');
}

function renderAnalytics(){
  const fYears = S.aYear === -1 ? S.years : S.years.filter((_,idx)=>idx===S.aYear);
  document.getElementById('yearFilt').innerHTML = `<button class="yfbtn ${S.aYear===-1?'active':''}" onclick="filterAYear(-1)">الكل</button>` + S.years.map((y,idx)=>`<button class="yfbtn ${S.aYear===idx?'active':''}" onclick="filterAYear(${idx})">${y.name}</button>`).join('');

  let tInc=0, tExp=0, mCount=0, bestM={net:-999999,n:''}, worstM={net:999999,n:''};
  let monthlyData = [];
  let catTotals = {}; CATS.forEach(c=>catTotals[c.k]=0);

  fYears.forEach(y=>{
    y.months.forEach(m=>{
      const inc=totalInc(m), exp=totalExp(m), net=inc-exp;
      if(inc>0 || exp>0){
        tInc+=inc; tExp+=exp; mCount++;
        monthlyData.push({lbl:`${y.name} - ${m.name}`, inc, exp, net, savePct:inc>0?Math.round(net/inc*100):0});
        if(net > bestM.net) bestM = {net, n:`${y.name} - ${m.name}`};
        if(net < worstM.net) worstM = {net, n:`${y.name} - ${m.name}`};
        const bc=byCat(m); CATS.forEach(c=>catTotals[c.k]+=bc[c.k]);
      }
    });
  });

  document.getElementById('aKpis').innerHTML = `
    <div class="kpi"><div class="kpi-lbl">إجمالي الدخل</div><div class="kpi-val green">${fmt(tInc)} ج</div></div>
    <div class="kpi"><div class="kpi-lbl">إجمالي المصروفات</div><div class="kpi-val red">${fmt(tExp)} ج</div></div>
    <div class="kpi"><div class="kpi-lbl">إجمالي الصافي</div><div class="kpi-val ${tInc-tExp>=0?'green':'red'}">${fmt(tInc-tExp)} ج</div></div>
    <div class="kpi"><div class="kpi-lbl">معدل التوفير العام</div><div class="kpi-val green">${tInc>0?Math.round((tInc-tExp)/tInc*100):0}%</div></div>`;

  if(!mCount){
    ['bestWorst','netChart','incExpChart','catChart','saveChart'].forEach(id=>document.getElementById(id).innerHTML='<div class="empty">لا توجد بيانات كافية للتقارير</div>');
    return;
  }

  document.getElementById('bestWorst').innerHTML = `
    <div class="hl-card" style="background:var(--greenbg);color:var(--greentc)"><div class="hl-lbl">أفضل شهر وفر</div><div class="hl-name">${bestM.n}</div><div class="hl-val">+${fmt(bestM.net)} ج</div></div>
    <div class="hl-card" style="background:var(--redbg);color:var(--redtc)"><div class="hl-lbl">أكثر شهر عجز</div><div class="hl-name">${worstM.n}</div><div class="hl-val">${fmt(worstM.net)} ج</div></div>`;

  const maxNet = Math.max(...monthlyData.map(d=>Math.abs(d.net)), 1);
  document.getElementById('netChart').innerHTML = monthlyData.map(d=>`
    <div class="bar-row">
      <div class="bar-label" title="${d.lbl}">${d.lbl}</div>
      <div class="bar-track2"><div class="bar-fill2" style="width:${Math.round(Math.abs(d.net)/maxNet*100)}%;background:${d.net>=0?'var(--green)':'var(--red)'};margin-right:${d.net<0?'auto':'0'}"></div></div>
      <div class="bar-val ${d.net>=0?'green':'red'}">${d.net>=0?'+':''}${fmt(d.net)} ج</div>
    </div>`).join('');

  const maxIE = Math.max(...monthlyData.map(d=>Math.max(d.inc, d.exp)), 1);
  document.getElementById('incExpChart').innerHTML = monthlyData.map(d=>`
    <div class="bar-row" style="margin-bottom:10px;">
      <div class="bar-label" style="font-weight:700;">${d.lbl}</div>
      <div style="flex:1; display:flex; flex-direction:column; gap:2px;">
        <div style="display:flex; align-items:center; gap:6px;">
          <div style="width:50px; font-size:9px; color:var(--green); text-align:left;">دخل</div>
          <div class="bar-track2" style="height:8px;"><div class="bar-fill2" style="width:${Math.round(d.inc/maxIE*100)}%;background:var(--green)"></div></div>
          <div style="width:70px; font-size:10px; font-weight:600; text-align:left; color:var(--green);">${fmt(d.inc)} ج</div>
        </div>
        <div style="display:flex; align-items:center; gap:6px;">
          <div style="width:50px; font-size:9px; color:var(--red); text-align:left;">صرف</div>
          <div class="bar-track2" style="height:8px;"><div class="bar-fill2" style="width:${Math.round(d.exp/maxIE*100)}%;background:var(--red)"></div></div>
          <div style="width:70px; font-size:10px; font-weight:600; text-align:left; color:var(--red);">${fmt(d.exp)} ج</div>
        </div>
      </div>
    </div>`).join('');

  const maxCat = Math.max(...Object.values(catTotals), 1);
  document.getElementById('catChart').innerHTML = CATS.map(c=>`
    <div class="bar-row">
      <div class="bar-label">${c.n}</div>
      <div class="bar-track2"><div class="bar-fill2" style="width:${Math.round(catTotals[c.k]/maxCat*100)}%;background:${c.c}"></div></div>
      <div class="bar-val" style="color:${c.c}">${fmt(catTotals[c.k])} ج</div>
    </div>`).join('');

  document.getElementById('saveChart').innerHTML = monthlyData.map(d=>`
    <div class="bar-row">
      <div class="bar-label">${d.lbl}</div>
      <div class="bar-track2"><div class="bar-fill2" style="width:${Math.max(0, Math.min(100, d.savePct))}%;background:var(--purple)"></div></div>
      <div class="bar-val purple" style="color:var(--purpletc)">${d.savePct}%</div>
    </div>`).join('');
}

  nEl.value=''; aEl.value=''; nEl.focus(); save(); render();

  if(type==='month') { pY=yi; document.getElementById('mMonthTitle').textContent=`إضافة شهر لـ ${S.years[yi].name}`; document.getElementById('mMonth').classList.add('open'); }
};
window.closeModals = () => { document.querySelectorAll('.overlay:not(#authOverlay)').forEach(o=>o.classList.remove('open')); };

window.confirmYear = () => {
  const inp=document.getElementById('mYearInput'); if(!inp.value) return;
  S.years.push({name:inp.value, months:[]}); S.years.sort((a,b)=>a.name.localeCompare(b.name));
  S.curY=S.years.findIndex(y=>y.name===inp.value); S.curM=0; inp.value=''; closeModals(); save(); render();
};
window.confirmMonth = () => {
  const inp=document.getElementById('mMonthInput'); if(!inp.value.trim() || pY===null) return;
  S.years[pY].months.push({name:inp.value.trim(), incomeSources:[], income:0, items:[]});
  S.curY=pY; S.curM=S.years[pY].months.length-1; inp.value=''; closeModals(); save(); render();
};

window.openRY = (yi) => { pY=yi; document.getElementById('mRenameYInput').value=S.years[yi].name; document.getElementById('mRenameY').classList.add('open'); };
window.confirmRenameY = () => { const inp=document.getElementById('mRenameYInput'); if(inp.value.trim() && pY!==null){ S.years[pY].name=inp.value.trim(); closeModals(); save(); render(); } };

window.openRM = (yi, mi) => { pMY=yi; pMI=mi; document.getElementById('mRenameMInput').value=S.years[yi].months[mi].name; document.getElementById('mRenameM').classList.add('open'); };
window.confirmRenameM = () => { const inp=document.getElementById('mRenameMInput'); if(inp.value.trim() && pMY!==null && pMI!==null){ S.years[pMY].months[pMI].name=inp.value.trim(); closeModals(); save(); render(); } };

window.delYear = (yi) => { if(confirm(`مسح سنة ${S.years[yi].name} باللي فيها؟`)){ S.years.splice(yi,1); if(S.curY>=S.years.length) S.curY=Math.max(0,S.years.length-1); S.curM=0; save(); render(); } };
window.delMonth = (yi, mi) => { if(confirm(`مسح شهر ${S.years[yi].months[mi].name}؟`)){ S.years[yi].months.splice(mi,1); if(yi===S.curY) S.curM=Math.max(0,Math.min(S.curM,S.years[yi].months.length-1)); save(); render(); } };

document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) closeModals(); }));
document.getElementById('iAmt').addEventListener('keydown',e=>e.key==='Enter'&&addItem());
document.getElementById('iName').addEventListener('keydown',e=>e.key==='Enter'&&document.getElementById('iAmt').focus());
document.getElementById('incAmt').addEventListener('keydown',e=>e.key==='Enter'&&addInc());
document.getElementById('incName').addEventListener('keydown',e=>e.key==='Enter'&&document.getElementById('incAmt').focus());
document.getElementById('mYearInput').addEventListener('keydown',e=>e.key==='Enter'&&confirmYear());
document.getElementById('mMonthInput').addEventListener('keydown',e=>e.key==='Enter'&&confirmMonth());
document.getElementById('mRenameMInput').addEventListener('keydown',e=>e.key==='Enter'&&confirmRenameM());
document.getElementById('mRenameYInput').addEventListener('keydown',e=>e.key==='Enter'&&confirmRenameY());

window.toggleSidebar = () => {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebarBackdrop');
  const isMobile = window.innerWidth <= 768;
  if(isMobile) {
    const willOpen = !sb.classList.contains('mob-open');
    sb.classList.toggle('mob-open', willOpen);
    bd.style.display = willOpen?'block':'none';
  } else {
    sb.classList.toggle('collapsed');
  }
};
</script>
</body>
</html>
