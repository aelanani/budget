<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ميزانيتي</title>
<style>
:root {
  --font: 'Segoe UI', system-ui, sans-serif;
  --bg: #f8f8f8; --bg2: #ffffff; --bg3: #f2f2f2;
  --txt: #1a1a1a; --txt2: #666; --txt3: #999;
  --brd: #e8e8e8; --brd2: #ddd;
  --blue: #2563EB; --bluebg: #EFF6FF; --bluetc: #1D4ED8;
  --green: #16a34a; --greenbg: #F0FDF4; --greentc: #15803D;
  --red: #DC2626; --redbg: #FEF2F2; --redtc: #B91C1C;
  --yellow: #D97706; --yellowbg: #FFFBEB; --yellowtc: #B45309;
  --purple: #7C3AED; --purplebg: #F5F3FF; --purpletc: #6D28D9;
  --rad: 8px; --rad2: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--txt); min-height: 100vh; }
.app { display: flex; flex-direction: row; height: 100vh; overflow: hidden; }
.sidebar { width: 210px; min-width: 210px; background: var(--bg2); border-left: 1px solid var(--brd); display: flex; flex-direction: column; overflow: hidden; transition: width .25s, min-width .25s; position: relative; }
.sidebar.collapsed { width: 36px; min-width: 36px; }
.sidebar.collapsed .sidebar-inner { opacity: 0; pointer-events: none; }
.sidebar-inner { flex: 1; display: flex; flex-direction: column; overflow: hidden; transition: opacity .2s; }
.sidebar-toggle { position: absolute; top: 50%; left: -18px; transform: translateY(-50%); width: 18px; height: 48px; background: var(--bg2); border: 1px solid var(--brd); border-right: none; border-radius: 6px 0 0 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--txt3); z-index: 10; box-shadow: -2px 0 5px rgba(0,0,0,.08); }
.sidebar.collapsed .sidebar-toggle { left: 0; border-radius: 0 6px 6px 0; border-right: 1px solid var(--brd); border-left: none; }
.toggle-arrow { transition: transform .25s; display: inline-block; }
.sidebar.collapsed .toggle-arrow { transform: rotate(180deg); }
.sidebar-logo { padding: 14px 12px 10px; border-bottom: 1px solid var(--brd); }
.sidebar-logo h1 { font-size: 14px; font-weight: 700; }
.sidebar-logo p { font-size: 11px; color: var(--txt3); margin-top: 2px; }
.sync-status { font-size: 10px; margin-top: 4px; }
.sync-ok { color: var(--green); } .sync-err { color: var(--red); } .sync-load { color: var(--txt3); }
.years-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
.year-hd { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; cursor: pointer; user-select: none; }
.year-hd:hover { background: var(--bg3); }
.year-hd-left { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--txt2); }
.chev { font-size: 10px; transition: transform .2s; }
.chev.open { transform: rotate(90deg); }
.year-hd-actions { display: flex; gap: 2px; opacity: 0; }
.year-hd:hover .year-hd-actions { opacity: 1; }
.icon-btn { background: none; border: none; cursor: pointer; font-size: 11px; padding: 2px 4px; border-radius: 4px; color: var(--txt3); }
.icon-btn:hover { background: var(--brd); color: var(--txt); }
.months-list { overflow: hidden; max-height: 0; transition: max-height .25s; }
.months-list.open { max-height: 600px; }
.month-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 12px 5px 22px; cursor: pointer; font-size: 12px; color: var(--txt2); border-radius: 6px; margin: 1px 6px; }
.month-item:hover { background: var(--bg3); }
.month-item.active { background: var(--bluebg); color: var(--bluetc); font-weight: 600; }
.month-item-actions { display: flex; gap: 2px; opacity: 0; }
.month-item:hover .month-item-actions { opacity: 1; }
.add-month-btn { display: flex; align-items: center; gap: 5px; margin: 2px 10px; padding: 4px 8px; border: 1px dashed var(--brd2); border-radius: var(--rad); background: none; color: var(--txt3); font-size: 11px; cursor: pointer; font-family: var(--font); width: calc(100% - 20px); }
.add-month-btn:hover { color: var(--blue); border-color: var(--blue); }
.add-year-btn { margin: 8px 10px 4px; padding: 6px 8px; border: 1px dashed var(--brd2); border-radius: var(--rad); background: none; color: var(--txt3); font-size: 11px; cursor: pointer; font-family: var(--font); width: calc(100% - 20px); text-align: center; }
.add-year-btn:hover { color: var(--blue); border-color: var(--blue); }
.main { flex: 1; overflow-y: auto; background: var(--bg); min-width: 0; width: 100%; transition: all .25s ease; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; border-bottom: 1px solid var(--brd); background: var(--bg2); position: sticky; top: 0; z-index: 10; }
.topbar-title { font-size: 14px; font-weight: 700; }
.page-tabs { display: flex; border: 1px solid var(--brd2); border-radius: var(--rad); overflow: hidden; }
.ptab { padding: 5px 16px; border: none; background: none; font-size: 12px; cursor: pointer; font-family: var(--font); color: var(--txt2); }
.ptab:not(:last-child) { border-left: 1px solid var(--brd2); }
.ptab.active { background: var(--bluebg); color: var(--bluetc); font-weight: 600; }
.content { padding: 16px 20px; }
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
.kpi { background: var(--bg2); border: 1px solid var(--brd); border-radius: var(--rad2); padding: 12px 14px; }
.kpi-lbl { font-size: 10px; color: var(--txt3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
.kpi-val { font-size: 18px; font-weight: 700; }
.green { color: var(--green); } .red { color: var(--red); } .blue { color: var(--blue); } .gray { color: var(--txt2); }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.card { background: var(--bg2); border: 1px solid var(--brd); border-radius: var(--rad2); padding: 14px; }
.card-title { font-size: 12px; font-weight: 700; color: var(--txt2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .04em; }
.stabs { display: flex; border: 1px solid var(--brd2); border-radius: var(--rad); overflow: hidden; width: fit-content; margin-bottom: 12px; }
.stab { padding: 5px 14px; border: none; background: none; font-size: 12px; cursor: pointer; font-family: var(--font); color: var(--txt2); }
.stab:not(:last-child) { border-left: 1px solid var(--brd2); }
.stab.active { background: var(--bluebg); color: var(--bluetc); font-weight: 600; }
.chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.chip { padding: 3px 10px; border-radius: 20px; border: 1px solid var(--brd2); background: none; font-size: 11px; cursor: pointer; font-family: var(--font); color: var(--txt2); }
.chip.active { font-weight: 600; }
.add-row { display: flex; gap: 6px; margin-bottom: 10px; }
.add-row input { font-size: 12px; font-family: var(--font); border: 1px solid var(--brd2); border-radius: var(--rad); padding: 6px 10px; outline: none; }
.add-row input:focus { border-color: var(--blue); }
.add-row input:first-child { flex: 1; }
.add-row input:nth-child(2) { width: 90px; }
.add-btn { padding: 0 12px; border-radius: var(--rad); border: none; background: var(--bluebg); color: var(--bluetc); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); white-space: nowrap; }
.add-btn-green { padding: 0 12px; border-radius: var(--rad); border: none; background: var(--greenbg); color: var(--greentc); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); white-space: nowrap; }
.items { max-height: 250px; overflow-y: auto; }
.item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--brd); font-size: 12px; }
.item:last-child { border-bottom: none; }
.item-name { flex: 1; }
.item-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; }
.item-amt { font-weight: 600; min-width: 70px; text-align: left; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--txt3); font-size: 14px; padding: 1px 4px; }
.del-btn:hover { color: var(--red); }
.empty { text-align: center; padding: 20px; color: var(--txt3); font-size: 12px; }
.sum-item { padding: 7px 0; border-bottom: 1px solid var(--brd); font-size: 12px; }
.sum-item:last-child { border-bottom: none; }
.sum-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
.bar-track { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; }
.yfilt { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.yfbtn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--brd2); background: none; font-size: 11px; cursor: pointer; font-family: var(--font); color: var(--txt2); }
.yfbtn.active { background: var(--bluebg); color: var(--bluetc); border-color: var(--blue); font-weight: 600; }
.full { grid-column: 1/-1; }
.hl-card { border-radius: var(--rad); padding: 10px 12px; margin-bottom: 8px; }
.hl-lbl { font-size: 10px; color: var(--txt2); margin-bottom: 3px; }
.hl-name { font-size: 14px; font-weight: 700; }
.hl-val { font-size: 12px; margin-top: 2px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 11px; }
.bar-label { width: 100px; color: var(--txt2); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10px; }
.bar-track2 { flex: 1; height: 14px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bar-fill2 { height: 100%; border-radius: 3px; }
.bar-val { width: 90px; text-align: left; font-weight: 600; font-size: 11px; white-space: nowrap; }
.total-row { display: flex; justify-content: space-between; font-weight: 700; font-size: 13px; padding: 8px 0; border-top: 1px solid var(--brd); margin-top: 6px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--bg2); border-radius: var(--rad2); padding: 20px; min-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
.modal h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.modal label { font-size: 12px; color: var(--txt2); display: block; margin-bottom: 4px; }
.modal input { width: 100%; font-size: 13px; font-family: var(--font); border: 1px solid var(--brd2); border-radius: var(--rad); padding: 7px 10px; outline: none; margin-bottom: 12px; }
.modal input:focus { border-color: var(--blue); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.btn-ok { padding: 6px 16px; border-radius: var(--rad); border: none; background: var(--bluebg); color: var(--bluetc); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); }
.btn-cancel { padding: 6px 12px; border-radius: var(--rad); border: 1px solid var(--brd2); background: none; font-size: 12px; cursor: pointer; font-family: var(--font); color: var(--txt2); }

/* ═══ DESKTOP ═══ */
.app { display: flex; flex-direction: row; width: 100%; height: 100vh; overflow: hidden; }

/* ═══ TABLET ═══ */
@media (max-width: 900px) {
  .bar-label { width: 85px; font-size: 10px; }
  .bar-val { width: 80px; font-size: 10px; }
}

/* ═══ MOBILE ═══ */
@media (max-width: 768px) {
  html, body { overflow-x: hidden !important; max-width: 100vw; }
  .app { display: block !important; width: 100% !important; height: 100vh; overflow-y: auto; overflow-x: hidden !important; }
  .main { display: block !important; width: 100% !important; max-width: 100vw !important; margin: 0 !important; padding: 0 !important; min-width: 0 !important; }
  .sidebar { position: fixed !important; top: 0 !important; right: -280px !important; width: 280px !important; min-width: 280px !important; height: 100vh !important; z-index: 9999 !important; transition: right .3s ease !important; box-shadow: -4px 0 24px rgba(0,0,0,.3) !important; background: var(--bg2) !important; overflow-y: auto !important; }
  .sidebar.mob-open { right: 0 !important; }
  .sidebar.collapsed { width: 280px !important; right: -280px !important; opacity: 1 !important; }
  .sidebar.collapsed.mob-open { right: 0 !important; }
  .sidebar.collapsed .sidebar-inner { opacity: 1 !important; pointer-events: auto !important; }
  .sidebar-toggle { display: none !important; }
  .mob-menu-btn { display: flex !important; }
  .grid2 { display: block !important; }
  .grid2 > * { width: 100% !important; margin-bottom: 12px; }
  .full { grid-column: auto; }
  .kpis { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
  .kpi-val { font-size: 15px; }
  .add-row input, .card { max-width: 100% !important; }
  .add-row input:nth-child(2) { width: 80px !important; }
  .modal { min-width: unset !important; width: 90vw !important; }
  .topbar { padding: 10px 12px 8px !important; gap: 6px; }
  .topbar-title { font-size: 12px; }
  .content { padding: 10px 12px !important; }
  .ptab { padding: 4px 8px !important; font-size: 11px; }
  .bar-label { width: 65px !important; font-size: 9px !important; }
  .bar-val { width: 65px !important; font-size: 9px !important; }
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="إخفاء/إظهار القائمة"><span class="toggle-arrow">◀</span></button>
    <div class="sidebar-inner">
    <div class="sidebar-logo">
      <h1>💰 ميزانيتي</h1>
      <p>مصروفات ودخل</p>
      <div class="sync-status sync-load" id="syncStatus">⏳ جاري التحميل...</div>
    </div>
    <div class="years-scroll" id="yearsList"></div>
    <button class="add-year-btn" onclick="openModal('year')">+ سنة جديدة</button>
    </div>
  </div>
  <div id="sidebarBackdrop" onclick="toggleSidebar()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9998;"></div>
  <div class="main">
    <div class="topbar">
      <button class="mob-menu-btn" id="mobMenuBtn" onclick="toggleSidebar()" style="display:none;background:none;border:1px solid var(--brd2);border-radius:var(--rad);padding:5px 9px;cursor:pointer;font-size:14px;color:var(--txt2);margin-left:6px;">☰</button>
      <div class="topbar-title" id="pageTitle">—</div>
      <div class="page-tabs">
        <button class="ptab active" id="ptab1" onclick
